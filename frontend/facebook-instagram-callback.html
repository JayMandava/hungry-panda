<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Instagram...</title>
    <link rel="stylesheet" href="voice-styles.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8faf6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.8));
            backdrop-filter: blur(40px);
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 24px;
            padding: 48px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(110,154,66,0.15);
        }
        
        .icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6e9a42, #8ab85a);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        
        .icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }
        
        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1a2e12;
            margin: 0 0 12px;
        }
        
        p {
            font-size: 14px;
            color: rgba(26,46,18,0.7);
            margin: 0 0 24px;
            line-height: 1.5;
        }
        
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #6e9a42;
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(110,154,66,0.2);
            border-top-color: #6e9a42;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 12px;
            padding: 16px;
            margin-top: 24px;
            color: #dc2626;
            font-size: 13px;
        }
        
        .success {
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.2);
            border-radius: 12px;
            padding: 16px;
            margin-top: 24px;
            color: #16a34a;
            font-size: 13px;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #6e9a42, #8ab85a);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M3 9h18M9 21V9"/>
                <circle cx="15" cy="15" r="2"/>
            </svg>
        </div>
        
        <h1 id="title">Connecting to Instagram...</h1>
        <p id="message">Please wait while we complete the connection.</p>
        
        <div id="status" class="status">
            <div class="spinner"></div>
            <span>Processing login...</span>
        </div>
        
        <div id="result"></div>
    </div>

    <script>
        // Parse URL fragment for access token
        function parseFragment() {
            const hash = window.location.hash.substring(1); // Remove #
            if (!hash) return null;
            
            const params = new URLSearchParams(hash);
            return {
                access_token: params.get('access_token'),
                long_lived_token: params.get('long_lived_token'),
                expires_in: params.get('expires_in'),
                data_access_expiration_time: params.get('data_access_expiration_time'),
                state: params.get('state'),
                error: params.get('error'),
                error_description: params.get('error_description'),
                error_code: params.get('error_code')
            };
        }
        
        async function finalizeAuth() {
            const result = parseFragment();
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            const title = document.getElementById('title');
            const message = document.getElementById('message');
            
            // Check for errors
            if (result?.error) {
                title.textContent = 'Connection Failed';
                message.textContent = result.error_description || result.error || 'Authentication failed';
                statusDiv.innerHTML = '<span style="color: #dc2626;">❌ Failed</span>';
                resultDiv.innerHTML = `
                    <div class="error">
                        <strong>Error ${result.error_code || ''}:</strong> ${result.error_description || result.error}
                        <br><br>
                        <a href="/" class="btn">Return to Dashboard</a>
                    </div>
                `;
                return;
            }
            
            // Check for token
            if (!result?.access_token) {
                title.textContent = 'No Token Received';
                message.textContent = 'We did not receive an access token from Facebook.';
                statusDiv.innerHTML = '<span style="color: #dc2626;">❌ Failed</span>';
                resultDiv.innerHTML = `
                    <div class="error">
                        No access token found in the response.
                        <br><br>
                        <a href="/" class="btn">Return to Dashboard</a>
                    </div>
                `;
                return;
            }
            
            // Update status
            statusDiv.innerHTML = '<div class="spinner"></div><span>Finalizing connection...</span>';
            
            try {
                // POST token to finalize endpoint
                const response = await fetch('/api/facebook-instagram/oauth/finalize', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        access_token: result.access_token,
                        long_lived_token: result.long_lived_token,
                        expires_in: result.expires_in,
                        data_access_expiration_time: result.data_access_expiration_time,
                        state: result.state
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok || !data.connected) {
                    throw new Error(data.error || data.message || 'Finalization failed');
                }
                
                // Success
                title.textContent = 'Connected!';
                message.textContent = `Your Instagram account @${data.instagram_username || data.page_name} is now connected.`;
                statusDiv.innerHTML = '<span style="color: #16a34a;">✓ Success</span>';
                resultDiv.innerHTML = `
                    <div class="success">
                        <strong>Connected successfully!</strong><br>
                        Page: ${data.page_name}<br>
                        Instagram Business Account: ${data.instagram_business_account_id}
                        <br><br>
                        <a href="/" class="btn">Return to Dashboard</a>
                    </div>
                `;
                
            } catch (error) {
                console.error('Finalize error:', error);
                title.textContent = 'Connection Failed';
                message.textContent = 'We received a token but could not complete the connection.';
                statusDiv.innerHTML = '<span style="color: #dc2626;">❌ Failed</span>';
                resultDiv.innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> ${error.message}
                        <br><br>
                        <a href="/" class="btn">Return to Dashboard</a>
                    </div>
                `;
            }
        }
        
        // Run on page load
        document.addEventListener('DOMContentLoaded', finalizeAuth);
    </script>
</body>
</html>
