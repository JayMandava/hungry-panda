<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hungry Panda - Instagram Growth Agent</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 5px; }
        .subtitle { color: #8b8b9a; margin-bottom: 30px; }
        
        /* Upload Card */
        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #2d2d44;
        }
        .card h2 { margin-top: 0; font-size: 18px; }
        
        /* Drop Zone */
        .drop-zone {
            border: 2px dashed #3d3d5c;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            background: #0f0f23;
            transition: all 0.2s;
            margin-bottom: 16px;
        }
        .drop-zone.dragover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }
        .drop-zone .icon { font-size: 48px; margin-bottom: 10px; }
        .drop-zone p { color: #8b8b9a; margin: 0 0 15px 0; }
        
        /* Buttons */
        .btn {
            background: linear-gradient(135deg, #e94560 0%, #d63852 100%);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-secondary {
            background: #2d2d44;
        }
        
        /* Chat Bar */
        .chat-container {
            display: none;
            margin-top: 16px;
        }
        .chat-container.active { display: block; }
        .chat-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0f0f23;
            border: 1px solid #3d3d5c;
            border-radius: 24px;
            padding: 4px 4px 4px 16px;
        }
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            padding: 8px 0;
            outline: none;
        }
        .chat-input::placeholder { color: #5a5a7a; }
        .chat-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mic-btn { background: #2d2d44; color: #fff; }
        .mic-btn.recording { background: #ef4444; animation: pulse 1.5s infinite; }
        .send-btn { background: linear-gradient(135deg, #e94560 0%, #d63852 100%); color: white; }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .file-name {
            color: #4ade80;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        /* Status */
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .status.show { display: block; }
        .status.success { background: rgba(74, 222, 128, 0.1); color: #4ade80; border: 1px solid #4ade80; }
        .status.error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; }
        .status.loading { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid #3b82f6; }
        
        /* Results */
        .results {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #0f0f23;
            border-radius: 12px;
            border: 1px solid #2d2d44;
        }
        .results.show { display: block; }
        .results h3 { color: #e94560; margin-top: 0; }
        .result-section { margin-bottom: 15px; }
        .result-section strong { color: #fff; display: block; margin-bottom: 5px; }
        .result-section p { color: #b4b4c7; margin: 0; line-height: 1.5; }
        .hashtags { color: #4ade80; font-size: 14px; }
        
        /* Queue */
        .queue-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: #0f0f23;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .queue-thumb { width: 60px; height: 60px; background: #2d2d44; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .queue-info { flex: 1; }
        .queue-title { font-weight: 600; font-size: 14px; }
        .queue-status { font-size: 12px; color: #8b8b9a; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐼 Hungry Panda</h1>
        <p class="subtitle">AI-powered Instagram growth for food content</p>
        
        <!-- Upload Section -->
        <div class="card">
            <h2>📤 Upload Content</h2>
            
            <div class="drop-zone" id="dropZone">
                <div class="icon">🍽️</div>
                <p>Drop food photos here or tap below</p>
                <button class="btn" onclick="document.getElementById('fileInput').click()">
                    Select File
                </button>
                <input type="file" id="fileInput" accept="image/*,video/*" hidden>
            </div>
            
            <!-- Chat Bar (shows after file selected) -->
            <div class="chat-container" id="chatContainer">
                <div class="file-name" id="fileName"></div>
                <div class="chat-bar">
                    <input 
                        type="text" 
                        id="contextInput" 
                        class="chat-input" 
                        placeholder="Describe your dish (optional)..."
                    >
                    <button class="chat-btn mic-btn" id="micBtn" title="Voice input">🎤</button>
                    <button class="chat-btn send-btn" id="sendBtn" title="Upload">⬆️</button>
                </div>
            </div>
            
            <div class="status" id="status"></div>
            
            <!-- Results -->
            <div class="results" id="results">
                <h3>🤖 AI Recommendations</h3>
                <div class="result-section">
                    <strong>Caption:</strong>
                    <p id="resultCaption"></p>
                </div>
                <div class="result-section">
                    <strong>Hashtags:</strong>
                    <p class="hashtags" id="resultHashtags"></p>
                </div>
                <div class="result-section">
                    <strong>Best Time:</strong>
                    <p id="resultTime"></p>
                </div>
            </div>
        </div>
        
        <!-- Content Queue -->
        <div class="card">
            <h2>📋 Recent Uploads</h2>
            <div id="queue"></div>
        </div>
    </div>
    
    <script>
        // Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const chatContainer = document.getElementById('chatContainer');
        const fileName = document.getElementById('fileName');
        const contextInput = document.getElementById('contextInput');
        const micBtn = document.getElementById('micBtn');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');
        const results = document.getElementById('results');
        
        let selectedFile = null;
        let isRecording = false;
        let recognition = null;
        
        // Initialize voice
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            
            recognition.onresult = (e) => {
                let text = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    text += e.results[i][0].transcript;
                }
                contextInput.value = text;
            };
            
            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove('recording');
            };
        } else {
            micBtn.style.display = 'none';
        }
        
        // File selection
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        // Drag & drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        
        function handleFiles(files) {
            if (files.length) {
                selectedFile = files[0];
                fileName.textContent = '📎 ' + selectedFile.name;
                chatContainer.classList.add('active');
                contextInput.focus();
                showStatus('📎 File selected! Add context & tap ⬆️', 'loading');
            }
        }
        
        // Voice
        micBtn.addEventListener('click', () => {
            if (!recognition) return;
            
            if (isRecording) {
                recognition.stop();
                isRecording = false;
                micBtn.classList.remove('recording');
            } else {
                recognition.start();
                isRecording = true;
                micBtn.classList.add('recording');
            }
        });
        
        // Upload
        sendBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                showStatus('❌ Select a file first', 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('context', contextInput.value);
            formData.append('auto_optimize', 'true');
            
            showStatus('📤 Uploading & analyzing...', 'loading');
            
            try {
                const res = await fetch('/api/content/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                
                if (data.recommendation) {
                    document.getElementById('resultCaption').textContent = data.recommendation.suggested_caption;
                    document.getElementById('resultHashtags').textContent = data.recommendation.suggested_hashtags.map(t => '#' + t).join(' ');
                    document.getElementById('resultTime').textContent = (data.recommendation.optimal_time?.time || '6:00 PM') + ' - ' + (data.recommendation.optimal_time?.reasoning || 'Peak time');
                    results.classList.add('show');
                    showStatus('✅ Upload complete! See recommendations below', 'success');
                } else {
                    showStatus('✅ Uploaded! No AI analysis available', 'success');
                }
                
                // Reset
                selectedFile = null;
                fileInput.value = '';
                contextInput.value = '';
                chatContainer.classList.remove('active');
                fileName.textContent = '';
                
                loadQueue();
                
            } catch (err) {
                showStatus('❌ Upload failed: ' + err.message, 'error');
            }
        });
        
        function showStatus(msg, type) {
            status.textContent = msg;
            status.className = 'status show ' + type;
            if (type !== 'loading') {
                setTimeout(() => status.classList.remove('show'), 5000);
            }
        }
        
        // Load queue
        async function loadQueue() {
            try {
                const res = await fetch('/api/content/pending');
                const data = await res.json();
                const queue = document.getElementById('queue');
                
                if (data.pending && data.pending.length) {
                    queue.innerHTML = data.pending.slice(0, 5).map(item => `
                        <div class="queue-item">
                            <div class="queue-thumb">🍽️</div>
                            <div class="queue-info">
                                <div class="queue-title">${item.filename}</div>
                                <div class="queue-status">${item.status}</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    queue.innerHTML = '<p style="color: #5a5a7a; text-align: center;">No uploads yet</p>';
                }
            } catch (e) {
                console.error('Queue load failed:', e);
            }
        }
        
        // Initial load
        loadQueue();
    </script>
</body>
</html>
